jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch core Rust crate from upstream
        run: |
          WORKSPACE="${{ github.workspace }}"
          CORE_DEST="$WORKSPACE/core"

          # Already present — skip
          if [ -f "$CORE_DEST/Cargo.toml" ]; then
            echo "core/Cargo.toml already exists — skipping fetch."
            exit 0
          fi

          echo "Cloning upstream localsend repo to /tmp/ls-upstream ..."
          git clone --depth 1 https://github.com/localsend/localsend.git /tmp/ls-upstream

          # Locate core/Cargo.toml anywhere in the cloned repo
          CORE_SRC=$(find /tmp/ls-upstream -maxdepth 3 -name "Cargo.toml" \
            -path "*/core/Cargo.toml" | head -1 | xargs -I{} dirname {})

          if [ -z "$CORE_SRC" ]; then
            echo "ERROR: could not find core/Cargo.toml in upstream repo!"
            find /tmp/ls-upstream -name "Cargo.toml" | head -20
            exit 1
          fi

          echo "Found core crate at: $CORE_SRC"
          cp -r "$CORE_SRC" "$CORE_DEST"
          rm -rf /tmp/ls-upstream

          # Verify
          if [ ! -f "$CORE_DEST/Cargo.toml" ]; then
            echo "ERROR: core/Cargo.toml still missing after copy!"
            exit 1
          fi
          echo "core/Cargo.toml successfully placed at $CORE_DEST"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-android-arm64-${{ hashFiles('app/rust/Cargo.lock') }}
          restore-keys: cargo-android-arm64-

      - name: Decode & place keystore
        run: |
          echo "${{ env.KEYSTORE_BASE64 }}" | tr -d ' \n' | base64 --decode > ${{ github.workspace }}/my-release-key.jks

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build release APK (arm64-v8a only)
        working-directory: app
        run: |
          flutter build apk --release --target-platform android-arm64 \
            --dart-define=FLUTTER_BUILD_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1) \
            --dart-define=FLUTTER_BUILD_NUMBER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-release-key.jks
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}

      - name: Sign APK
        id: sign
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: app/build/app/outputs/flutter-apk
          signingKeyBase64: ${{ env.KEYSTORE_BASE64 }}
          keyStorePassword: ${{ env.STORE_PASSWORD }}
          keyAlias: ${{ env.KEY_ALIAS }}
          keyPassword: ${{ env.KEY_PASSWORD }}

      - name: Rename signed APK
        run: |
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
             app/build/app/outputs/flutter-apk/app-arm64-v8a-release-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-arm64-v8a
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-release-signed.apk
          retention-days: 30

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | awk '{print $2}' | tr -d "'\"")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Use git tag if triggered by tag push, otherwise generate one
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="release-v${VERSION}-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release v${{ steps.version.outputs.version }}"
          body: |
            ## Release APK — arm64-v8a

            **Version:** `${{ steps.version.outputs.version }}`
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Run:** #${{ github.run_number }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your device
            3. Open the APK to install

            > ✅ This is a **signed release** build ready for distribution.
          files: app/build/app/outputs/flutter-apk/app-arm64-v8a-release-signed.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
