name: Build Debug APK (arm64-v8a)

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust_builder/target
          key: cargo-android-arm64-${{ hashFiles('app/rust_builder/Cargo.lock') }}
          restore-keys: cargo-android-arm64-

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build debug APK (arm64-v8a only)
        working-directory: app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-arm64-v8a
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 7
