name: Build Debug APK (arm64-v8a)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: "3.35.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch core Rust crate from upstream
        run: |
          WORKSPACE="${{ github.workspace }}"
          CORE_DEST="$WORKSPACE/core"

          # Already present (e.g. cached layer) — skip
          if [ -f "$CORE_DEST/Cargo.toml" ]; then
            echo "core/Cargo.toml already exists — skipping fetch."
            exit 0
          fi

          echo "Cloning upstream localsend repo to /tmp/ls-upstream ..."
          git clone --depth 1 https://github.com/localsend/localsend.git /tmp/ls-upstream

          # Locate core/Cargo.toml anywhere in the cloned repo
          CORE_SRC=$(find /tmp/ls-upstream -maxdepth 3 -name "Cargo.toml" \
            -path "*/core/Cargo.toml" | head -1 | xargs -I{} dirname {})

          if [ -z "$CORE_SRC" ]; then
            echo "ERROR: could not find core/Cargo.toml in upstream repo!"
            find /tmp/ls-upstream -name "Cargo.toml" | head -20
            exit 1
          fi

          echo "Found core crate at: $CORE_SRC"
          cp -r "$CORE_SRC" "$CORE_DEST"
          rm -rf /tmp/ls-upstream

          # Verify
          if [ ! -f "$CORE_DEST/Cargo.toml" ]; then
            echo "ERROR: core/Cargo.toml still missing after copy!"
            exit 1
          fi
          echo "core/Cargo.toml successfully placed at $CORE_DEST"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/rust/target
          key: cargo-android-arm64-${{ hashFiles('app/rust/Cargo.lock') }}
          restore-keys: cargo-android-arm64-

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Build debug APK (arm64-v8a only)
        working-directory: app
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-arm64-v8a
          path: app/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 7

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' app/pubspec.yaml | awk '{print $2}' | tr -d "'\"")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=debug-v${VERSION}-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Debug Build v${{ steps.version.outputs.version }} (#${{ github.run_number }})"
          body: |
            ## Debug APK — arm64-v8a

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Run:** #${{ github.run_number }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            > ⚠️ This is a **debug** build intended for testing only.
          files: app/build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
